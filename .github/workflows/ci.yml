# Two-job pipeline (docs/new-project-directives.md §13). The `test` job with
# coverage against a shared DB branch lands with bootstrap step 7 — see the
# deferred table in docs/CHARTER.md. Until then `static` runs the unit suite
# (no DB required).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run format:check
      - run: bun run check:docs
      - run: bun run check:migrations
      - run: bun run check:env
      - run: bun run test:unit
